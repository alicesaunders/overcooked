<!DOCTYPE html>
<html>
  <head>
    <title>Overcooked</title>
    <link rel="stylesheet" href="./style.css"/>
    <script src="./app.js"></script>
  </head>

  <body>
    <div id="introduction">
        <h1>What's in your fridge?</h1>
    </div>
    <div class="app">
        <div id="user-inputs" class="sidebar">
            <div id="ingredients-input" class="ingredients-input">
                <label for="ingredients">Please enter your ingredients:</label></br>
                <!-- error message if a non-letter character is entered-->
                <p id="error-message"></p>
                <input type="text" id="ingredients" name="ingredients" oninput="lettersOnly(this)">
                </br></br>             
                <button id="ingredient-submit" onclick="pushData();">Add</button>
                <!--ingredients list-->
                <ul id="ingredients-list"></ul>
                <!--submit list button-->
                </br></br>
                <button id="submit-button">Submit</button>
            </div>     
        </div>
        <div id="results" class="results">
        </div>
    </div>
  </body>
