<!DOCTYPE html>
<html>
  <head>
    <title>Overcooked</title>
    <link rel="stylesheet" href="./style.css"/>
    <script src="./app.js"></script>
  </head>

  <body>
    <div id="introduction">
        <h1>What's in your fridge?</h1>
    </div>
    <div class="app">
        <div id="user-inputs" class="sidebar">
            <div id="ingredients-input" class="ingredients-input">
                <label for="ingredients">Please enter your ingredients:</label></br>
                <input type="text" id="ingredients" name="ingredient-select" onkeyup="lettersOnly(this)">
                </br></br>
                <button id="ingredient-submit">Add</button>
            </div> 
            <div class="submit-button">
                <button id="submit">Submit</button>
            </div>
        </div>
        <div id="results" class="results">
        </div>
    </div>
  </body>
